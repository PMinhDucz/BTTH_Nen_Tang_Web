<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JSX Advanced - Conditional & List Rendering</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        .badge { padding: 5px 10px; border-radius: 12px; color: white; font-size: 12px; font-weight: bold; }
        .badge.excellence { background: gold; color: black; }
        .badge.good { background: green; }
        .badge.average { background: orange; }
        .badge.poor { background: red; }
        table { width: 100%; max-width: 500px; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background-color: #f2f2f2; }
    </style>
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        function GradeBadge({ score }) {
            let badgeClass = '';
            let label = '';

            if (score >= 9) { badgeClass = 'excellence'; label = 'Xuất sắc'; }
            else if (score >= 8) { badgeClass = 'good'; label = 'Giỏi'; }
            else if (score >= 6) { badgeClass = 'average'; label = 'Khá'; }
            else { badgeClass = 'poor'; label = 'Yếu'; }

            return <span className={`badge ${badgeClass}`}>{label}</span>;
        }

        function GradeTable({ students }) {
            if (!students || students.length === 0) {
                return <p>Không có sinh viên nào trong danh sách.</p>;
            }

            return (
                <table>
                    <thead>
                        <tr>
                            <th>STT</th>
                            <th>Tên Sinh Viên</th>
                            <th>Điểm</th>
                            <th>Xếp loại</th>
                        </tr>
                    </thead>
                    <tbody>
                        {students.map((student, index) => (
                            <tr key={student.id}>
                                <td>{index + 1}</td>
                                <td>{student.name} {student.score >= 9 && '⭐'}</td>
                                <td>{student.score}</td>
                                <td><GradeBadge score={student.score} /></td>
                            </tr>
                        ))}
                    </tbody>
                </table>
            );
        }

        function App() {
            const studentData = [
                { id: 1, name: 'Phạm Minh Đức', score: 9.5 },
                { id: 2, name: 'Nguyễn Văn A', score: 8.0 },
                { id: 3, name: 'Trần Thị B', score: 6.5 },
                { id: 4, name: 'Lê Văn C', score: 4.0 },
            ];

            return (
                <div>
                    <h1>Bảng Điểm Lớp Web</h1>
                    <GradeTable students={studentData} />
                    
                    <h2 style={{marginTop: '40px'}}>Trường hợp không có dữ liệu:</h2>
                    <GradeTable students={[]} />
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
