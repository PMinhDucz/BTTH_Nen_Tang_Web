<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JSX Basics</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background-color: #f5f5f5; }
        .header { background: #333; color: white; padding: 15px; text-align: center; border-radius: 5px; }
        .user-card { background: white; padding: 20px; margin-top: 20px; border-radius: 5px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); max-width: 300px; }
        .user-card img { width: 100%; border-radius: 5px; margin-bottom: 10px; }
    </style>
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        function Header() {
            return (
                <header className="header">
                    <h1>Phạm Minh Đức's Portfolio</h1>
                    <p>Software Engineering Student at TLU</p>
                </header>
            );
        }

        function UserCard({ name, role, avatarUrl }) {
            return (
                <div className="user-card">
                    <img src={avatarUrl} alt={`${name}'s avatar`} />
                    <h2>{name}</h2>
                    <p><strong>Role:</strong> {role}</p>
                </div>
            );
        }

        function App() {
            return (
                <div>
                    <Header />
                    <UserCard 
                        name="Phạm Minh Đức" 
                        role="Frontend Developer" 
                        avatarUrl="https://via.placeholder.com/300x200.png?text=PMD+Avatar" 
                    />
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
